<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Customiser Scene</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: black;
        height: 100%;
        overflow: hidden;
      }

      #canvas-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background-color: skyblue;
      }

      #top-right-box {
        position: absolute;
        top: 50px;
        right: 50px;
        background-color: rgba(0, 0, 0, 0.2);
        color: white;
        padding: 30px 50px;
        border-radius: 30px;
        font-family: sans-serif;
        font-size: 30px;
        z-index: 10;
        pointer-events: none;
        pointer-events: auto;
      }
    </style>

    <!-- ✅ Import map for cleaner module imports -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
      }
    }
    </script>
  </head>

  <body>
    <div id="canvas-container">
      <div id="top-right-box">
        <input type="range" id="slider-1" min="0" max="100" value="50" />
        <br /><br />
        <input type="range" id="slider-2" min="0" max="100" value="50" />
        <br /><br />
        <input type="range" id="slider-3" min="0" max="100" value="50" />
        <br /><br />
        <input type="range" id="slider-4" min="0" max="100" value="50" />
        <br /><br />
        <input type="range" id="slider-5" min="0" max="100" value="50" />
        <br /><br />
        <input type="range" id="slider-5" min="0" max="100" value="50" />
      </div>
    </div>

    <script type="module">
      import * as THREE from 'three';

      const scene = new THREE.Scene();
      scene.background = new THREE.Color('skyblue');

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      const light = new THREE.AmbientLight(0xffffff, 1);
      scene.add(light);

      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
    <!-- ✅ Load the JS correctly -->
    <script type="module" src="Scene.js"></script>
  </body>
</html>
